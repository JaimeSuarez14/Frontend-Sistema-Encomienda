<div class="min-h-screen bg-slate-100 text-slate-800 antialiased selection:bg-blue-600 selection:text-white">
  <header
    class="sticky top-0 z-20 border-b border-slate-200 bg-white/90 px-4 py-3 backdrop-blur md:hidden animate-fade-in-down">
    <div class="mx-auto flex max-w-7xl items-center justify-between">
      <div>
        <p class="text-xs font-medium uppercase tracking-[0.2em] text-slate-500">Admin</p>
        <h1 class="text-base font-semibold text-slate-900">Dashboard Encomiendas</h1>
      </div>
      <button type="button"
        class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 text-slate-700 transition hover:border-blue-300 hover:text-blue-600 active:scale-95"
        (click)="toggleMenu()">
        <i class="bi text-xl" [ngClass]="isMenuOpen ? 'bi-x-lg' : 'bi-list'" aria-hidden="true"></i>
      </button>
    </div>
  </header>

  <button type="button" aria-label="Cerrar menú"
    [class]="'fixed inset-0 z-30 bg-slate-950/45 backdrop-blur-[1px] transition-opacity duration-300 md:hidden ' +(isMenuOpen ? 'opacity-100 ' : 'opacity-0 pointer-events-none')"
    (click)="closeMenu()"></button>

  <aside
    class="fixed inset-y-0 left-0 z-40 w-72 -translate-x-full overflow-y-auto bg-slate-900 px-4 pb-6 pt-5 text-slate-200 shadow-2xl transition-transform duration-300 ease-out md:translate-x-0 md:px-5"
    [class.translate-x-0]="isMenuOpen" [class.-translate-x-full]="!isMenuOpen">
    <div class="mb-8 animate-fade-in-down">
      <p class="text-xs uppercase tracking-[0.22em] text-blue-300/80">Panel administrativo</p>
      <h1 class="mt-1 text-xl font-bold text-white">Peru<span class="text-blue-400">Fast</span></h1>
      <p class="mt-1 text-xs text-slate-400">Gestiona envíos, rutas y reportes en tiempo real.</p>
    </div>

    <div class="mb-6 animate-fade-in-up rounded-2xl bg-slate-800/60 p-3 ring-1 ring-white/10">
      <div class="flex items-center gap-3">
        <img class="h-10 w-10 rounded-full object-cover"
          src="https://images.unsplash.com/photo-1542909168-82c3e7fdca5c?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=128&q=80"
          alt="Admin">
        <div class="min-w-0">
          <p class="truncate text-sm font-semibold text-white">Edward Tompson</p>
          <p class="truncate text-xs text-slate-400">Supervisor general</p>
        </div>
      </div>
    </div>

    <nav class="space-y-2">
      @for (item of menuItems; track item.label) {
      <a href="#"
        class="group flex items-center gap-3 rounded-xl px-3 py-3 transition-all duration-300 hover:translate-x-1"
        [ngClass]="
            item.active
              ? 'bg-blue-600 text-white shadow-md shadow-blue-900/30'
              : 'text-slate-300 hover:bg-slate-800 hover:text-white'
          " (click)="closeMenu()">
        <i class="text-base transition-transform duration-300 group-hover:scale-110" [ngClass]="item.icon"></i>
        <div class="min-w-0">
          <p class="truncate text-sm font-semibold">{{ item.label }}</p>
          <p class="truncate text-xs text-slate-400 transition-colors duration-300" [class.text-blue-100]="item.active">
            {{ item.subtitle }}
          </p>
        </div>
        <i class="bi bi-chevron-right ml-auto text-[10px] opacity-0 transition-all duration-300 group-hover:translate-x-0.5 group-hover:opacity-100"
          [class.text-blue-100]="item.active" aria-hidden="true"></i>
      </a>
      }
    </nav>
  </aside>

  <div>
    <router-outlet />
  </div>

</div>
