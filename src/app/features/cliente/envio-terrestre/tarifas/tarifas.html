<div class="flex justify-center flex-col items-center text-4xl h-screen bg-gray-100 font-bold">
  Tarifas terrestres
  <div class="mx-auto text-lg flex rounded-lg justify-center font-sans p-5 bg-gray-600 animate-fade-in-down">
    <div id="tabs-container" data-active="0"
      class="w-150 overflow-hidden rounded-lg border border-white/10 bg-slate-900">

      <div class="relative flex list-none border-b border-white/10 p-0">
        <button (click)="moveTab(0)"
          class="tab-btn flex-1 cursor-pointer py-3 text-center transition-all duration-300 text-white/60 hover:bg-blue-500/5 outline-none">
          Sobre
        </button>
        <button (click)="moveTab(1)"
          class="tab-btn flex-1 cursor-pointer py-3 text-center transition-all duration-300 text-white/60 hover:bg-blue-500/5 outline-none">
          Paquetes
        </button>
        <button (click)="moveTab(2)"
          class="tab-btn flex-1 cursor-pointer py-3 text-center transition-all duration-300 text-white/60 hover:bg-blue-500/5 outline-none">
          Personalizados
        </button>

        <div id="indicator" class="absolute bottom-0 h-1 bg-blue-500 transition-all duration-300 w-1/3 "
          [ngClass]="{ 'left-0': tabs()[0], 'left-[33.33%]': tabs()[1], 'left-[66.66%]': tabs()[2] }"></div>
      </div>

      <div id="sliding-content" [class]="' flex w-[300%] transition-transform  duration-500 ease-in-out '" [ngClass]="{ 'translate-x-0': tabs()[0],
    '-translate-x-1/3': tabs()[1],
    '-translate-x-2/3': tabs()[2] }">

        <div class="grid min-h-37.5 w-full place-items-center p-4 text-white">
          <p class="font-light">Documentos simples en
            sobre manila / Tamaño A4</p>
          <span class="text-2xl font-bold text-yellow-500">S/ 8.00</span>

        </div>

        <div class="grid min-h-37.5 w-full place-items-center p-4 text-white">
          <p>Lista del Paquetes</p>
          <button (click)="openBox()" class="p-2 rounded bg-green-500">Ver Precios</button>
        </div>

        <div class="grid min-h-37.5 w-full place-items-center p-4 text-white">
          <p>Cotize su carga con nosotros en linea</p>
          <button class="p-2 rounded bg-green-500">Whatsapp</button>
        </div>

      </div>
    </div>
  </div>
</div>
@if (modal()) {
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50">

  <div class="bg-white p-6 rounded-lg relative w-lg animate-fade-in-up border-2 border-blue-800">
    <i class="bi bi-x-circle absolute top-2 right-2 cursor-pointer text-red-600 font-bold text-2xl"
      (click)="openBox()"></i>
    <p class="text-black py-2 font-medium">Lista del Paquetes</p>
    <div class="h-100 overflow-hidden flex  rounded-lg border border-white/10 bg-slate-900">
      <div class="border border-gray-900 flex flex-col">
        <button (click)="moveTab(1)"
          class="tab-btn w-full flex-1 cursor-pointer border-r-3 border-white p-3 text-center transition-all duration-300 text-white/60 hover:bg-blue-500/5 outline-none">
          XS
        </button>
        <button (click)="moveTab(2)"
          class="tab-btn w-full flex-1 cursor-pointer py-3 border-r-3 border-white text-center transition-all duration-300 text-white/60 hover:bg-blue-500/5 outline-none">
          S
        </button>
        <button (click)="moveTab(2)"
          class="tab-btn w-full flex-1 cursor-pointer py-3 border-r-3 border-white text-center transition-all duration-300 text-white/60 hover:bg-blue-500/5 outline-none">
          M
        </button>
        <button (click)="moveTab(2)"
          class="tab-btn w-full flex-1 cursor-pointer py-3 border-r-3 border-white text-center transition-all duration-300 text-white/60 hover:bg-blue-500/5 outline-none">
          M
        </button>
      </div>
      <div class="flex-1">

      </div>
    </div>
  </div>

</div>
}
